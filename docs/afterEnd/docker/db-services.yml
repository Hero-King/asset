services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    command: 
      - --default-time-zone=+08:00
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-1234qwer%}
      - TZ=Asia/Shanghai  # 东八区时区
      # 基础编码配置（无需额外文件）
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_general_ci
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - shared-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-1234qwer%}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    container_name: redis
    restart: always
    environment:
      - TZ=Asia/Shanghai  # 东八区时区
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - shared-network

  # 新增 RabbitMQ 服务
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    ports:
      - "5673:5672"   # AMQP 协议端口
      - "15672:15672" # 管理界面端口
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - shared-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data: # 新增卷

networks:
  shared-network:
    external: true